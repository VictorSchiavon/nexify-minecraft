name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B --file pom.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexifyMinecraft
          path: target/NexifyMinecraft-*.jar
          retention-days: 30

      # Cria uma Release automaticamente quando você taguear (ex: git tag v1.0.0)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/NexifyMinecraft-*.jar
          generate_release_notes: true
